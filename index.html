  <script>
    const popup  = document.getElementById('voter-popup');
    const avatar = document.getElementById('popup-avatar');
    const text   = document.getElementById('popup-text');

    // Pre-fetch a batch of random users so popups feel instant
    let userQueue = [];
    let isFetching = false;

    async function fetchUsers() {
      if (isFetching) return;
      isFetching = true;
      try {
        const res = await fetch('https://randomuser.me/api/?results=10&inc=name,location,picture&nat=us,gb,au,ca,de,fr,es,nl,br,mx,no,fi,dk,se,nz');
        const data = await res.json();
        userQueue.push(...data.results);
      } catch (e) {
        // fallback names if API fails
        const fallbacks = [
          { name:{first:'Alex',last:'Rivera'}, location:{country:'United States'}, picture:{thumbnail:'https://i.pravatar.cc/44?u=1'} },
          { name:{first:'Lena',last:'Müller'}, location:{country:'Germany'}, picture:{thumbnail:'https://i.pravatar.cc/44?u=2'} },
          { name:{first:'Kai',last:'Nakamura'}, location:{country:'Japan'}, picture:{thumbnail:'https://i.pravatar.cc/44?u=3'} },
        ];
        userQueue.push(...fallbacks);
      }
      isFetching = false;
    }

    async function getNextUser() {
      if (userQueue.length < 3) fetchUsers();
      if (userQueue.length === 0) await fetchUsers();
      return userQueue.shift();
    }

    let hideTimer = null;

    async function showPopup() {
      const user = await getNextUser();
      const fullName = `${user.name.first} ${user.name.last}`;
      const country  = user.location.country;
      const imgSrc   = user.picture?.large || user.picture?.medium || user.picture?.thumbnail || '';

      const preload = new Image();
      preload.src = imgSrc;

      const swap = () => {
        avatar.style.transition = 'none';
        avatar.style.opacity = '0';
        avatar.src = imgSrc;
        requestAnimationFrame(() => requestAnimationFrame(() => {
          avatar.style.transition = 'opacity 0.25s ease';
          avatar.style.opacity = '1';
        }));
        text.textContent = `${fullName} from ${country} just voted.`;
        popup.classList.add('show');
        clearTimeout(hideTimer);
        hideTimer = setTimeout(() => {
          popup.classList.remove('show');
          setTimeout(showPopup, 400);
        }, 1100);
      };

      if (preload.complete) { swap(); }
      else { preload.onload = swap; preload.onerror = swap; }
    }

    // ── Avatar cluster ──────────────────────────────────────────
    async function loadAvatarCluster() {
      try {
        const res  = await fetch('https://randomuser.me/api/?results=6&inc=picture');
        const data = await res.json();
        const cluster = document.getElementById('avatar-cluster');
        cluster.innerHTML = '';
        data.results.forEach((u, i) => {
          const img = document.createElement('img');
          img.src = u.picture.thumbnail;
          img.alt = 'voter';
          img.style.cssText = `
            width:28px; height:28px;
            border-radius:50%;
            border:2px solid white;
            object-fit:cover;
            margin-left:-8px;
            box-shadow:0 1px 4px rgba(0,0,0,0.18);
            background:#e0e7ef;
          `;
          cluster.appendChild(img);
        });
      } catch(e) {
        // silently fail — cluster just stays empty
      }
    }
    loadAvatarCluster();

    // Kick off after a short initial delay
    fetchUsers().then(() => setTimeout(showPopup, 800));
  </script>
